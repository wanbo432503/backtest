<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票回测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        .main-container {
            max-width: 1800px;
            margin: 0 auto;
            height: 100vh;
            padding: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app-layout {
            flex: 1;
            min-height: 0;
        }
        .pane-column {
            height: 100%;
            min-height: 0;
            overflow-y: auto;
            padding-bottom: 4px;
        }
        .center-pane {
            display: flex;
            flex-direction: column;
        }
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 16px;
        }
        .pane-column > .card:last-child {
            margin-bottom: 0;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        .card-body {
            padding: 1rem;
        }
        .settings-card .card-body {
            padding: 12px;
        }
        .settings-card .mb-3 {
            margin-bottom: 0.65rem !important;
        }
        .settings-card .form-label {
            font-size: 0.8rem;
            margin-bottom: 0.18rem;
            white-space: nowrap;
        }
        .settings-card .form-control,
        .settings-card .form-select {
            min-height: 34px;
            font-size: 0.84rem;
            padding: 0.28rem 0.55rem;
        }
        .settings-card .form-text {
            font-size: 0.72rem;
            line-height: 1.2;
            margin-top: 0.18rem;
        }
        .settings-card .btn-sm {
            font-size: 0.78rem;
            padding: 0.22rem 0.45rem;
        }
        .settings-card .btn-primary.w-100 {
            padding: 0.42rem;
        }
        .settings-card .compact-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 0.65rem;
        }
        .settings-card .compact-row .mb-3 {
            margin-bottom: 0 !important;
        }
        .settings-card .strategy-help {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .settings-card .strategy-help .btn {
            flex: 0 0 auto;
        }
        .settings-card .example-symbols {
            line-height: 1.25;
        }
        .settings-card #stockSearchPanel {
            padding: 8px !important;
        }
        .stats-panel .card-body {
            padding: 8px 10px 10px;
        }
        .stats-panel .card-header {
            padding: 0.45rem 1rem;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .chart-card {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .chart-card .card-body {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .plot-container {
            flex: 1;
            min-height: 0;
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            overflow: auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
            font-weight: 500;
            padding: 0.5rem;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
        .example-symbols {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
        }
        .alert {
            border-radius: 8px;
            font-size: 0.875rem;
        }
        /* 股票搜索样式 */
        #stockSearchPanel {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 4px solid #0d6efd;
        }
        #searchResultsList {
            border: 1px solid #dee2e6;
        }
        #searchResultsList .list-group-item {
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            padding: 0.75rem;
        }
        #searchResultsList .list-group-item:hover {
            background-color: #e7f1ff;
            border-color: #0d6efd;
            transform: translateX(5px);
        }
        .input-group .btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
        }
        .symbol-suggestion {
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 4px;
            transition: background-color 0.2s;
            font-size: 0.75rem;
        }
        .symbol-suggestion:hover {
            background-color: #e9ecef;
        }
        .plot-iframe {
            width: 100%;
            height: 100%;
            min-height: 640px;
            border: none;
            border-radius: 8px;
        }
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .form-control, .form-select {
            font-size: 0.875rem;
            padding: 0.375rem 0.75rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0;
        }
        .lead {
            font-size: 1.1rem;
            font-weight: 300;
        }
        .display-4 {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .spinner-border {
            width: 2rem;
            height: 2rem;
        }
        .progress {
            height: 0.5rem;
            margin-top: 1rem;
        }
        .data-source-note {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c757d;
            font-size: 0.76rem;
            font-weight: 600;
            padding: 0;
        }
        .data-source-note i {
            color: #6c757d;
        }
        .stats-table-wrap {
            overflow-x: auto;
        }
        .stats-table {
            min-width: 720px;
            margin-bottom: 0;
            table-layout: fixed;
            white-space: nowrap;
        }
        .stats-table th {
            color: #6c757d;
            font-size: 0.72rem;
            font-weight: 700;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            padding: 4px 8px;
            text-align: center;
        }
        .stats-table td {
            color: #212529;
            font-size: 0.92rem;
            font-weight: 700;
            padding: 5px 8px;
            text-align: center;
            vertical-align: middle;
        }
        .insight-section {
            border-top: 1px solid #e9ecef;
            padding-top: 10px;
            margin-top: 10px;
        }
        .insight-section h6 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .insight-item {
            padding: 6px 0;
            border-bottom: 1px solid #f1f3f5;
        }
        .insight-item:last-child {
            border-bottom: none;
        }
        .insight-empty {
            color: #6c757d;
        }
        .quote-strip {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            font-size: 0.78rem;
        }
        .quote-strip div {
            background: #f8f9fa;
            border-radius: 4px;
            padding: 6px;
        }
        @media (max-width: 1199.98px) {
            body {
                overflow: auto;
            }
            .main-container {
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }
            .pane-column {
                height: auto;
                overflow: visible;
            }
            .chart-card {
                min-height: 680px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="row g-3 app-layout">
            <div class="col-xl-3 col-lg-4 pane-column">
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="fas fa-cog"></i> 回测参数设置
                    </div>
                    <div class="card-body">
                        <form id="backtestForm">
                            <div class="mb-3">
                                <label for="symbol" class="form-label">A股代码 
                                    <button type="button" class="btn btn-sm btn-outline-info ms-2" onclick="toggleStockSearch()" id="searchToggleBtn">
                                        <i class="fas fa-search"></i> 搜索股票
                                    </button>
                                </label>
                                
                                <!-- 股票代码输入 -->
                                <input type="text" class="form-control" id="symbol"
                                       placeholder="例如: SZ002241, SH600519" value="SZ002241" required>
                                
                                <!-- 搜索界面（默认隐藏） -->
                                <div id="stockSearchPanel" class="mt-2" style="display:none; border: 1px solid #dee2e6; border-radius: 4px; padding: 10px; background-color: #f8f9fa;">
                                    <label for="searchQuery" class="form-label small">搜索公司名称</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="searchQuery" 
                                               placeholder="输入A股公司名称，如: 中科曙光、贵州茅台">
                                        <button class="btn btn-primary" type="button" onclick="performStockSearch()">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </div>
                                    
                                    <!-- 搜索结果 -->
                                    <div id="searchResults" class="mt-2" style="display:none;">
                                        <div class="small mb-2"><strong>搜索结果:</strong></div>
                                        <div id="searchResultsList" class="list-group" style="max-height: 200px; overflow-y: auto;">
                                            <!-- 结果动态插入这里 -->
                                        </div>
                                    </div>
                                    
                                    <!-- 搜索状态 -->
                                    <div id="searchStatus" class="alert alert-info small mt-2" style="display:none; margin-bottom: 0;">
                                        <i class="fas fa-spinner fa-spin"></i> 正在搜索...
                                    </div>
                                </div>
                                
                                <div class="example-symbols">
                                    <strong>快速选择:</strong>
                                    <span class="symbol-suggestion" onclick="setSymbol('SH603019')">中科曙光</span>,
                                    <span class="symbol-suggestion" onclick="setSymbol('SZ002241')">歌尔股份</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="strategy" class="form-label">回测策略</label>
                                <select class="form-select" id="strategy" required>
                                    <option value="loading">正在加载策略...</option>
                                </select>
                                <div class="form-text strategy-help">
                                    <span>
                                    <i class="fas fa-info-circle"></i>
                                    选择不同的交易策略进行回测
                                    </span>
                                    <button type="button" class="btn btn-sm btn-outline-primary ms-2" onclick="loadStrategies()">
                                        <i class="fas fa-sync-alt"></i> 刷新策略列表
                                    </button>
                                </div>
                            </div>
                            
                            <div class="compact-row">
                                <div class="mb-3">
                                    <label for="initialCash" class="form-label">初始资金 ($)</label>
                                    <input type="number" class="form-control" id="initialCash"
                                           min="100" max="1000000" step="100" value="10000" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="commission" class="form-label">交易手续费 (%)</label>
                                    <input type="number" class="form-control" id="commission"
                                           min="0" max="10" step="0.001" value="0.2" required>
                                </div>
                            </div>
                            
                            <div class="compact-row">
                                <div class="mb-3">
                                    <label for="startDate" class="form-label">开始日期</label>
                                    <input type="date" class="form-control" id="startDate" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="endDate" class="form-label">结束日期</label>
                                    <input type="date" class="form-control" id="endDate" required>
                                </div>
                            </div>
                            
                            <div class="compact-row">
                                <div class="mb-3">
                                    <label for="interval" class="form-label">数据频率</label>
                                    <select class="form-select" id="interval" required>
                                        <option value="1m">1分钟</option>
                                        <option value="2m">2分钟</option>
                                        <option value="5m">5分钟</option>
                                        <option value="15m">15分钟</option>
                                        <option value="30m">30分钟</option>
                                        <option value="60m">60分钟</option>
                                        <option value="90m">90分钟</option>
                                        <option value="1h">1小时</option>
                                        <option value="1d" selected>1天</option>
                                        <option value="5d">5天</option>
                                        <option value="1wk">1周</option>
                                        <option value="1mo">1月</option>
                                        <option value="3mo">3月</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="dataProvider" class="form-label">数据源</label>
                                    <select class="form-select" id="dataProvider" required>
                                        <option value="auto" selected>自动选择（A股优先 mootdx）</option>
                                        <option value="mootdx">通达信 mootdx（A股）</option>
                                        <option value="yfinance">Yahoo Finance</option>
                                    </select>
                                </div>
                                <div class="form-text" style="grid-column: 1 / -1;">
                                    <i class="fas fa-info-circle"></i>
                                    分钟级数据最多支持7天，小时级数据最多支持730天
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-play"></i> 开始回测
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <i class="fas fa-info-circle"></i> 策略说明
                    </div>
                    <div class="card-body">
                        <h6 class="card-title" id="strategyTitle">双均线交叉策略</h6>
                        <div id="strategyDescription">
                            <ul class="small mb-0">
                                <li>短期均线（10日）上穿长期均线（30日）时买入</li>
                                <li>短期均线下穿长期均线时卖出</li>
                            </ul>
                        </div>
                        <hr>
                        <div class="small text-muted">
                            <div>初始资金: <span id="currentCash">$10,000</span></div>
                            <div>手续费: <span id="currentCommission">0.2%</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-xl-6 col-lg-8 pane-column center-pane">
                <!-- 回测统计卡片 -->
                <div id="statsContainer" style="display: none;">
                    <div class="card stats-panel">
                        <div class="card-header">
                            <i class="fas fa-chart-bar"></i> 回测统计
                        </div>
                        <div class="card-body">
                            <div id="statsContent" class="stats-grid"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 回测结果图表卡片 -->
                <div class="card chart-card">
                    <div class="card-header">
                        <i class="fas fa-chart-area"></i> 回测结果图表
                    </div>
                    <div class="card-body">
                        <div class="loading-spinner" id="loadingSpinner">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                            <p class="mt-3 mb-0">正在执行回测，请稍候...</p>
                            <div class="progress mt-3">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     role="progressbar" style="width: 100%"></div>
                            </div>
                        </div>
                        
                        <div id="plotContainer" class="plot-container">
                            <div class="text-center text-muted py-5">
                                <i class="fas fa-chart-line fa-3x mb-3"></i>
                                <p class="mb-0">请设置参数并点击"开始回测"查看结果</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-lg-12 pane-column">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-newspaper"></i> 标的信息
                    </div>
                    <div class="card-body">
                        <div id="insightStatus" class="small text-muted">选择标的后加载</div>
                        <div id="insightWarnings" class="alert alert-warning small mt-2" style="display:none;"></div>
                        <div id="quotePanel" class="quote-strip mt-2"></div>

                        <div class="insight-section">
                            <h6>研报</h6>
                            <div id="reportsList" class="small">
                                <div class="insight-empty">暂无数据</div>
                            </div>
                        </div>
                        <div class="insight-section">
                            <h6>资金</h6>
                            <div id="fundFlowList" class="small">
                                <div class="insight-empty">暂无数据</div>
                            </div>
                        </div>
                        <div class="insight-section">
                            <h6>龙虎榜</h6>
                            <div id="dragonTigerList" class="small">
                                <div class="insight-empty">暂无数据</div>
                            </div>
                        </div>
                        <div class="insight-section">
                            <h6>公告</h6>
                            <div id="announcementsList" class="small">
                                <div class="insight-empty">暂无数据</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setSymbol(symbol) {
            document.getElementById('symbol').value = symbol;
            closeStockSearch();
            loadMarketInsights(symbol);
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getSearchResultBadge(type) {
            if (type === 'direct_match') return '精确';
            if (type === 'common_match') return '常见';
            if (type === 'remote_name_match') return 'A股';
            return '相似';
        }

        function isAShareSymbol(symbol) {
            const value = symbol.trim().toUpperCase();
            return /^\d{6}$/.test(value)
                || /^(SH|SZ|BJ)\d{6}$/.test(value)
                || /^\d{6}\.(SH|SZ|BJ)$/.test(value);
        }

        function renderInsightList(containerId, items, formatter) {
            const container = document.getElementById(containerId);
            if (!items || items.length === 0) {
                container.innerHTML = '<div class="insight-empty">暂无数据</div>';
                return;
            }
            container.innerHTML = items.map(formatter).join('');
        }

        function renderQuote(quote) {
            const container = document.getElementById('quotePanel');
            if (!quote || Object.keys(quote).length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = `
                <div><strong>${escapeHtml(quote.name || '-')}</strong><br>${escapeHtml(quote.price || '-')}</div>
                <div>涨跌幅<br>${escapeHtml(quote.change_pct || 0)}%</div>
                <div>PE(TTM)<br>${escapeHtml(quote.pe_ttm || '-')}</div>
                <div>PB<br>${escapeHtml(quote.pb || '-')}</div>
            `;
        }

        async function loadMarketInsights(symbol) {
            const status = document.getElementById('insightStatus');
            const warnings = document.getElementById('insightWarnings');
            status.textContent = '正在加载...';
            warnings.style.display = 'none';

            try {
                const response = await fetch(`/market-insights/${encodeURIComponent(symbol)}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '加载失败');
                }
                const data = await response.json();
                status.textContent = `标的: ${escapeHtml(data.symbol)}`;
                renderQuote(data.quote);

                if (data.warnings && data.warnings.length) {
                    warnings.style.display = 'block';
                    warnings.textContent = data.warnings.join('；');
                }

                renderInsightList('reportsList', data.reports, item => `
                    <div class="insight-item">
                        <strong>${escapeHtml(item.title || '-')}</strong><br>
                        <span class="text-muted">${escapeHtml(item.org || '')} ${escapeHtml(item.date || '')}</span>
                    </div>
                `);
                renderInsightList('fundFlowList', data.fund_flow, item => `
                    <div class="insight-item">
                        ${escapeHtml(item.date || '-')} 主力净流入: ${escapeHtml(item.main_net_inflow || 0)}
                    </div>
                `);
                renderInsightList('dragonTigerList', data.dragon_tiger, item => `
                    <div class="insight-item">
                        ${escapeHtml(item.date || '-')} ${escapeHtml(item.reason || '')}<br>
                        <span class="text-muted">净买入: ${escapeHtml(item.net_buy || '-')}</span>
                    </div>
                `);
                renderInsightList('announcementsList', data.announcements, item => `
                    <div class="insight-item">
                        <a href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title || '-')}</a><br>
                        <span class="text-muted">${escapeHtml(item.date || '')}</span>
                    </div>
                `);
            } catch (error) {
                status.textContent = `加载失败: ${error.message}`;
                renderQuote({});
            }
        }

        // 切换搜索界面的显示/隐藏
        function toggleStockSearch() {
            const panel = document.getElementById('stockSearchPanel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                document.getElementById('searchQuery').focus();
            } else {
                panel.style.display = 'none';
            }
        }

        // 关闭搜索界面
        function closeStockSearch() {
            document.getElementById('stockSearchPanel').style.display = 'none';
            document.getElementById('searchResults').style.display = 'none';
        }

        // 执行股票搜索
        async function performStockSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            
            if (!query) {
                alert('请输入搜索关键词');
                return;
            }
            
            const statusDiv = document.getElementById('searchStatus');
            const resultsDiv = document.getElementById('searchResults');
            const resultsList = document.getElementById('searchResultsList');
            
            // 显示加载状态
            statusDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            resultsList.innerHTML = '';
            
            try {
                const response = await fetch(`/search-stocks?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '搜索失败');
                }
                
                const data = await response.json();
                
                // 隐藏加载状态
                statusDiv.style.display = 'none';
                
                // 显示结果
                if (data.results && data.results.length > 0) {
                    resultsDiv.style.display = 'block';
                    resultsList.innerHTML = '';
                    
                    data.results.forEach(result => {
                        const item = document.createElement('button');
                        item.type = 'button';
                        item.className = 'list-group-item list-group-item-action';
                        
                        const confidence = result.confidence ? ` (相似度: ${result.confidence}%)` : '';
                        item.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>${result.symbol}</strong> - ${result.name}
                                    <br>
                                    <small class="text-muted">${result.sector || 'N/A'} | ${result.country || 'China'}${confidence}</small>
                                </div>
                                <span class="badge bg-primary">${getSearchResultBadge(result.type)}</span>
                            </div>
                        `;
                        
                        item.onclick = () => {
                            setSymbol(result.symbol);
                        };
                        
                        resultsList.appendChild(item);
                    });
                } else {
                    resultsDiv.style.display = 'none';
                    alert('未找到匹配的股票');
                }
            } catch (error) {
                statusDiv.style.display = 'none';
                alert(`搜索失败: ${error.message}`);
            }
        }

        // 回车键搜索
        document.addEventListener('DOMContentLoaded', function() {
            const searchQuery = document.getElementById('searchQuery');
            if (searchQuery) {
                searchQuery.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        performStockSearch();
                        e.preventDefault();
                    }
                });
            }
        });

        // 加载策略列表
        async function loadStrategies() {
            try {
                const response = await fetch('/strategies');
                if (!response.ok) {
                    throw new Error('获取策略列表失败');
                }
                
                const strategies = await response.json();
                const strategySelect = document.getElementById('strategy');
                
                // 清空现有选项
                strategySelect.innerHTML = '';
                
                // 添加策略选项
                strategies.forEach(strategy => {
                    const option = document.createElement('option');
                    option.value = strategy.name;
                    option.textContent = strategy.display_name;
                    option.setAttribute('data-description', strategy.description);
                    strategySelect.appendChild(option);
                });
                
                // 默认选择第一个策略
                if (strategies.length > 0) {
                    strategySelect.value = strategies[0].name;
                    updateStrategyDescription();
                }
                
            } catch (error) {
                console.error('加载策略失败:', error);
                alert('加载策略列表失败，请刷新页面重试');
            }
        }
        
        // 更新策略说明
        function updateStrategyDescription() {
            const strategySelect = document.getElementById('strategy');
            const selectedOption = strategySelect.options[strategySelect.selectedIndex];
            const title = document.getElementById('strategyTitle');
            const description = document.getElementById('strategyDescription');
            
            if (selectedOption && selectedOption.value !== 'loading') {
                title.textContent = selectedOption.textContent;
                description.innerHTML = `<ul class="small mb-0"><li>${selectedOption.getAttribute('data-description')}</li></ul>`;
            } else {
                title.textContent = '请选择策略';
                description.innerHTML = '<ul class="small mb-0"><li>选择回测策略后显示详细信息</li></ul>';
            }
            
            // 更新当前配置显示
            document.getElementById('currentCash').textContent = '$' + document.getElementById('initialCash').value;
            document.getElementById('currentCommission').textContent = document.getElementById('commission').value + '%';
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date();
            const oneYearAgo = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
            
            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = oneYearAgo.toISOString().split('T')[0];
            
            // 加载策略列表
            loadStrategies();
            
            // 监听策略选择变化
            document.getElementById('strategy').addEventListener('change', updateStrategyDescription);
            document.getElementById('initialCash').addEventListener('input', updateStrategyDescription);
            document.getElementById('commission').addEventListener('input', updateStrategyDescription);
        });
        
        document.getElementById('backtestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                symbol: document.getElementById('symbol').value.trim().toUpperCase(),
                strategy_name: document.getElementById('strategy').value,
                initial_cash: parseFloat(document.getElementById('initialCash').value),
                commission: parseFloat(document.getElementById('commission').value) / 100, // 转换为小数
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                interval: document.getElementById('interval').value,
                data_provider: document.getElementById('dataProvider').value
            };

            if (!isAShareSymbol(formData.symbol)) {
                alert('仅支持 A 股代码，请输入 6 位代码或 SH/SZ/BJ 前缀代码');
                return;
            }
            
            // 验证时间范围
            const startDate = new Date(formData.start_date);
            const endDate = new Date(formData.end_date);
            const daysDiff = (endDate - startDate) / (1000 * 60 * 60 * 24);
            
            if (formData.interval.includes('m') && daysDiff > 7) {
                if (!confirm('分钟级数据最多支持7天，是否继续？')) {
                    return;
                }
            }
            
            if (formData.interval === '1h' && daysDiff > 730) {
                if (!confirm('小时级数据最多支持730天，是否继续？')) {
                    return;
                }
            }
            
            // 显示加载动画
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('plotContainer').innerHTML = '';
            document.getElementById('statsContainer').style.display = 'none';
            
            try {
                const response = await fetch('/backtest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '回测失败');
                }
                
                const result = await response.json();
                
                // 显示统计信息
                const statsContent = document.getElementById('statsContent');
                statsContent.innerHTML = '';

                if (result.data_provider) {
                    const providerDiv = document.createElement('div');
                    providerDiv.className = 'data-source-note';
                    const warningText = result.data_warnings && result.data_warnings.length
                        ? `；${result.data_warnings.map(escapeHtml).join('；')}`
                        : '';
                    providerDiv.innerHTML = `<i class="fas fa-database"></i><span>数据源: ${escapeHtml(result.data_provider)}${warningText}</span>`;
                    statsContent.appendChild(providerDiv);
                }
                
                const statsEntries = Object.entries(result.stats);
                const tableWrap = document.createElement('div');
                tableWrap.className = 'stats-table-wrap';
                tableWrap.innerHTML = `
                    <table class="table table-sm table-bordered stats-table">
                        <thead>
                            <tr>${statsEntries.map(([key]) => `<th>${escapeHtml(key)}</th>`).join('')}</tr>
                        </thead>
                        <tbody>
                            <tr>${statsEntries.map(([, value]) => `<td>${escapeHtml(value)}</td>`).join('')}</tr>
                        </tbody>
                    </table>
                `;
                statsContent.appendChild(tableWrap);
                
                document.getElementById('statsContainer').style.display = 'block';
                
                // 使用iframe显示图表
                const iframe = document.createElement('iframe');
                iframe.className = 'plot-iframe';
                iframe.srcdoc = result.plot_html;
                
                document.getElementById('plotContainer').innerHTML = '';
                document.getElementById('plotContainer').appendChild(iframe);
                loadMarketInsights(formData.symbol);
                
            } catch (error) {
                document.getElementById('plotContainer').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle"></i> 
                        <strong>错误:</strong> ${error.message}
                        <hr>
                        <small class="mb-0">
                            <strong>提示:</strong><br>
                            • 请检查股票代码是否正确<br>
                            • 确保时间区间合理<br>
                            • 分钟级数据最多支持7天<br>
                            • 小时级数据最多支持730天
                        </small>
                    </div>
                `;
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
